worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 500m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        # Frontend (React SPA)
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # API Proxy — dynamic resolution to avoid startup failures
        location /api/ {
            resolver 127.0.0.11 valid=30s;
            set $api_upstream http://api:3000;
            limit_req zone=api burst=20 nodelay;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Auth rate limiting (stricter)
        location /api/auth/ {
            resolver 127.0.0.11 valid=30s;
            set $api_auth_upstream http://api:3000;
            limit_req zone=auth burst=3 nodelay;
            proxy_pass $api_auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # PHPNuxBill — proxy preserving /nuxbill/ prefix
        # We do NOT strip the prefix; PHPNuxBill runs at /nuxbill/ internally via Alias
        location /nuxbill/ {
            proxy_pass http://phpnuxbill:8080/nuxbill/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /nuxbill;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # CMS C-Data (host service, outside Docker)
        location /cms-cdata/ {
            proxy_pass http://host.docker.internal:18080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Mikhmon V3 — MikroTik Hotspot Monitor (optional)
        location /mikhmon/ {
            resolver 127.0.0.11 valid=30s;
            set $mikhmon_upstream http://mikhmon:80;
            proxy_pass $mikhmon_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}