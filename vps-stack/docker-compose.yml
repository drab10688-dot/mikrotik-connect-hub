# OmniSync Docker Stack

services:
  # ============================================
  # PostgreSQL - Base de datos principal
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: omnisync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-omnisync}
      POSTGRES_USER: ${DB_USER:-omnisync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    networks:
      - omnisync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-omnisync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API Backend - Node.js/Express
  # ============================================
  api:
    build: ./api
    container_name: omnisync-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-omnisync}
      DB_USER: ${DB_USER:-omnisync}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_postgres}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-192.168.88.1}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-443}
      MIKROTIK_USER: ${MIKROTIK_USER:-admin}
      MIKROTIK_PASS: ${MIKROTIK_PASS:-}
      RADIUS_SECRET: ${RADIUS_SECRET:-testing123}
      GENIEACS_NBI_URL: http://genieacs:7557
      BACKUP_DIR: /opt/omnisync/backups
      NUXBILL_DB_HOST: mariadb
      NUXBILL_DB_PORT: 3306
      NUXBILL_DB_USER: ${NUXBILL_DB_USER:-nuxbill}
      NUXBILL_DB_PASS: ${NUXBILL_DB_PASS:-}
      NUXBILL_DB_PASSWORD: ${NUXBILL_DB_PASSWORD:-}
      NUXBILL_DB_NAME: ${NUXBILL_DB_NAME:-phpnuxbill}
    ports:
      - "3000:3000"
    volumes:
      - backup_data:/opt/omnisync/backups
      - /usr/local/bin/cloudflared:/usr/local/bin/cloudflared:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - omnisync-net

  # ============================================
  # Nginx - Reverse Proxy + Frontend
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: omnisync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - omnisync-net

  # ============================================
  # MariaDB - Base de datos para FreeRADIUS + NuxBill
  # ============================================
  mariadb:
    image: mariadb:11
    container_name: omnisync-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_mysql}
      MYSQL_DATABASE: radius
      MYSQL_USER: radius
      MYSQL_PASSWORD: ${RADIUS_DB_PASSWORD:-changeme_radius}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./radius/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./mariadb-init/02-nuxbill.sql:/docker-entrypoint-initdb.d/02-nuxbill.sql
    ports:
      - "3306:3306"
    networks:
      - omnisync-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FreeRADIUS - Autenticación RADIUS
  # ============================================
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: omnisync-freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./radius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./radius/mods-enabled/sql:/etc/freeradius/mods-enabled/sql:ro
      - ./radius/sites-enabled/default:/etc/freeradius/sites-enabled/default:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - omnisync-net

  # ============================================
  # PHPNuxBill - Billing Hotspot MikroTik
  # ============================================
  phpnuxbill:
    build:
      context: ./phpnuxbill
      dockerfile: Dockerfile
    container_name: omnisync-phpnuxbill
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - nuxbill_uploads:/var/www/nuxbill/system/uploads
      - nuxbill_cache:/var/www/nuxbill/system/cache
      - nuxbill_ui_cache:/var/www/nuxbill/ui/cache
      - nuxbill_themes:/var/www/nuxbill/ui/themes
      - nuxbill_pages:/var/www/nuxbill/pages
      - ./radius/sql/schema.sql:/docker-entrypoint-initdb.d/radius-schema.sql:ro
    environment:
      NUXBILL_DB_HOST: mariadb
      NUXBILL_DB_USER: nuxbill
      NUXBILL_DB_PASS: ${NUXBILL_DB_PASS:-}
      NUXBILL_DB_PASSWORD: ${NUXBILL_DB_PASSWORD:-}
      NUXBILL_DB_NAME: phpnuxbill
      NUXBILL_APP_URL: ${NUXBILL_APP_URL:-http://localhost/nuxbill}
      RADIUS_DB_HOST: mariadb
      RADIUS_DB_PORT: "3306"
      RADIUS_DB_USER: radius
      RADIUS_DB_PASS: ${RADIUS_DB_PASSWORD:-changeme_radius}
      RADIUS_DB_NAME: radius
      MIKROTIK_HOST: ${MIKROTIK_HOST:-192.168.88.1}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USER: ${MIKROTIK_USER:-admin}
      MIKROTIK_PASS: ${MIKROTIK_PASS:-}
      RADIUS_SECRET: ${RADIUS_SECRET:-testing123}
      TZ: ${TZ:-America/Bogota}
    networks:
      - omnisync-net

  # ============================================
  # GenieACS - TR-069 (All-in-One)
  # Perfil: tr069 - iniciar con:
  #   docker compose --profile tr069 up -d
  # ============================================
  genieacs:
    image: drumsergio/genieacs:latest
    container_name: omnisync-genieacs
    restart: unless-stopped
    profiles:
      - tr069
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: mongodb://mongodb:27017/genieacs
      GENIEACS_UI_JWT_SECRET: ${GENIEACS_UI_JWT_SECRET:-changeme_genieacs_secret}
    ports:
      - "7547:7547"   # CWMP
      - "7557:7557"   # NBI (REST API)
      - "7567:7567"   # FS (File Server)
      - "3078:3000"   # UI (Web Interface)
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - omnisync-net

  # ============================================
  # MongoDB - Base de datos para GenieACS
  # ============================================
  mongodb:
    image: mongo:6
    container_name: omnisync-mongodb
    restart: unless-stopped
    profiles:
      - tr069
    volumes:
      - mongodb_data:/data/db
    networks:
      - omnisync-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # WireGuard VPN - Acceso remoto a redes MikroTik
  # Perfil: vpn - iniciar con:
  #   docker compose --profile vpn up -d
  # ============================================
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: omnisync-wireguard
    restart: unless-stopped
    profiles:
      - vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-America/Bogota}
    volumes:
      - wireguard_config:/config
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - omnisync-net

volumes:
  postgres_data:
  mariadb_data:
  backup_data:
  mongodb_data:
  nuxbill_uploads:
  nuxbill_cache:
  nuxbill_ui_cache:
  nuxbill_themes:
  nuxbill_pages:
  wireguard_config:

networks:
  omnisync-net:
    driver: bridge
